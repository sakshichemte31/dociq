spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: dociq-test-group
      auto-offset-reset: earliest
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhzMjU2
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  upload:
    base-dir: /tmp/dociq-test-uploads
  python-ml:
    base-url: http://localhost:8001
  kafka:
    topics:
      ingestion: doc.ingestion.test
      query: doc.query.test
      status: doc.status.test

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.dociq: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
